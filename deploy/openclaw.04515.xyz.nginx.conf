# Nginx config for openclaw.04515.xyz.
#
# Place at /etc/nginx/sites-available/openclaw.04515.xyz, symlink to
# /etc/nginx/sites-enabled/, then `nginx -t && systemctl reload nginx`.
#
# Get TLS via certbot:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d openclaw.04515.xyz
#
# Certbot will rewrite this file to inject `ssl_certificate*` lines and a
# port-80 → 443 redirect. The `location` blocks below survive that pass.

server {
  listen 80;
  listen [::]:80;
  server_name openclaw.04515.xyz;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name openclaw.04515.xyz;

  # certbot fills these in
  # ssl_certificate     /etc/letsencrypt/live/openclaw.04515.xyz/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/openclaw.04515.xyz/privkey.pem;

  # Body cap mirrors the relay's per-frame cap so a request body can't sneak
  # past application-layer limits via HTTP.
  client_max_body_size 1m;

  # ── Relay WSS ────────────────────────────────────────────────────────────
  # Upgrade headers are non-negotiable here. Long read/send timeouts because
  # paired sockets are long-lived (chat sessions, presence streams).
  #
  # `location = /relay` is EXACT match — `/relay-test` and friends fall through
  # to `location /` and reach Next.js. With a prefix match (just `/relay`),
  # Nginx grabs every URL starting with /relay and proxies it to the WS sidecar,
  # which returns 426 to plain HTTP and breaks the test page.
  location = /relay {
    proxy_pass http://127.0.0.1:4517;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  # ── Next.js app ──────────────────────────────────────────────────────────
  location / {
    proxy_pass http://127.0.0.1:4516;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Cookie $http_cookie;
  }
}
