# Hermes MCP config for Oasis
#
# Add this to ~/.hermes/config.yaml
#
# IMPORTANT: The key MUST be 'mcp_servers' (snake_case, plural).
# Using 'mcp' or 'mcpServers' will silently fail — Hermes only reads 'mcp_servers'.
# Do NOT add a 'type' field — Hermes infers HTTP transport from the 'url' key.
#
# Requires the MCP extra: cd ~/.hermes/hermes-agent && uv pip install -e ".[mcp]"
#
# After saving, run /reload-mcp in the Hermes session or restart the gateway.
# You can also install via CLI: hermes mcp add oasis --url http://127.0.0.1:4516/api/mcp/oasis

mcp_servers:
  oasis:
    url: http://127.0.0.1:4516/api/mcp/oasis

# If OASIS_MCP_KEY is set on the Oasis host, add auth:
#
# mcp_servers:
#   oasis:
#     url: http://127.0.0.1:4516/api/mcp/oasis
#     headers:
#       Authorization: "Bearer ${MCP_OASIS_API_KEY}"
